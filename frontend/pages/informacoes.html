<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSOR DHT11</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1 class="titulo">SENSOR DHT11</h1>
    </header>

    <main class="container">

        <section class="card">
            <div class="filtros">
                <div class="campo">
                    <label for="data-inicio">Data Início</label>
                    <input type="datetime-local" id="data-inicio">
                </div>
                <div class="campo">
                    <label for="data-fim">Data Fim</label>
                    <input type="datetime-local" id="data-fim">
                </div>
                <button class="btn" onclick="aplicarFiltro()" type="button">Filtrar</button>
                <button class="btn" onclick="limparFiltro()" type="button">Limpar</button>
            </div>

            <table id="tabela-completa">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Temperatura (°C)</th>
                        <th>Umidade (%)</th>
                        <th>Data-Hora</th>
                    </tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>

            <div class="btns">
                <button class="btn" onclick="voltar()">Anterior</button>
                <span id="pagina-info"></span>
                <button class="btn" onclick="avancar()">Próximo</button>
            </div>
        </section>

        <section class="card">
            <div class="grafico-box-info">
                <h2 class="titulo-card"></h2>
                <canvas id="grafico"></canvas>
            </div>
        </section>

    </main>

    <a class="btn-fixo" href="index.html">Voltar</a>

    <footer class="footer">
        <p>&copy; 2026 - Sensor DHT11</p>
    </footer>

    <script src="../js/script_informacoes.js"></script>
</body>
</html>
