<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1 class="titulo">Sensor</h1>

        <a href="#" class="login-link">
            <div class="login-icon"></div>
            Login
        </a>
    </header>

    <main class="container">

        <!-- MEDIDAS -->
        <section class="card medidas">

            <div class="bloco">
                <h2>Temperatura</h2>

                <div class="termometro">
                    <div id="tempFill" class="fill"></div>
                </div>

                <p id="temp" class="valor"></p>
            </div>

            <div class="bloco">
                <h2 class="titulo-umid">Umidade</h2>

                <div class="gota">
                    <div id="umidFill" class="fill"></div>
                </div>

                <p id="umid" class="valor"></p>
            </div>

        </section>

        <!-- TABELA -->
        <section class="card tabela">
            <h2 class="titulo-section">Últimos registros</h2>

            <table id="tabela-simples">
                <thead>
                    <tr>
                        <th>Temperatura (ºC)</th>
                        <th>Umidade (%)</th>
                    </tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>
        </section>

        <!-- GRÁFICOS -->
        <section class="card graficos">

            <div class="grafico-box">
                <h2>Temperatura</h2>
                <canvas id="grafico-temp"></canvas>
            </div>

            <div class="grafico-box">
                <h2>Umidade</h2>
                <canvas id="grafico-umid"></canvas>
            </div>

        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 - Dashboard Sensor</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
