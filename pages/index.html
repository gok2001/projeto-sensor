<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1 class="titulo">Sensor</h1>
        <a href="" class="login-link">
            <div class="login-icon"></div>
            Login
        </a>
    </header>

    <main class="main">
        <section id="temperatura">
            <p></p>
        </section>

        <section id="umidade">
            <p></p>
        </section>

        <section class="tabela">
            <h2 class="titulo-section">Últimos registros</h2>
            <table id="tabela-simples">
                <thead>
                    <tr>
                        <th>Temperatura (ºC)</th>
                        <th>Umidade (%)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="grafico">
                <canvas id="grafico-temp"></canvas>
                <canvas id="grafico-umid"></canvas>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; Todos os direitos reservados - 2026</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
